<html>
    <head>
        <title> Text styling properties </title>
    </head>
    <body> 
        <style>
        #new {
            color:rgb(241, 3, 43);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-weight: bold;
            font-style: italic;
            font-size: 40px;
            text-decoration: underline
        }
        #text {
            color:rgb(228, 178, 27);
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-style:italic;
            font-size: 20px;
            text-decoration: line-through;
            transform: rotate(2deg);
        }

        #red {
            color:rgb(131, 2, 126);
            font-weight: bold;
            font-size: 60px;
            text-shadow: 3px 3px rgb(237, 157, 231);
            text-transform: uppercase;
           
        }
        </style>

        <h1 id="new"> Typography </h1>
        <br><br>
        <p id="text">Text decoration</p>
       
        <h3 id="red">Designing</h3>
    </body>
</html>
