<!DOCTYPE html>
<html>
    <head>
        <title>Ice Cream Shop Menu</title>
    </head>

    <style>
     body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: rgb(180, 118, 180);
        text-align: center;
        color: #b6736f;
     }

     h1 {
        color: rgb(239, 151, 205);
        font-size: 40px;
     }

     h1 + p {
        color:#07000e;
        font-weight: bold;
        background-color: rgb(170, 205, 235);
        border-radius: 10px;
     }

     .shop-description {
        font-size: 35px;
        color: rgb(53, 116, 134);
        font-weight: bold;
     }

     .menu-box {
        width: 430px;
        background-color: rgb(108, 46, 117);
        border: 3px solid #fdfdfe;
        border-radius: 15px;
        margin: 2opx auto;
        padding: 20px;
     }

     ul {
        padding: 0;
     }

     ul > li {
         list-style: none;
         background-color: rgb(227, 171, 235);
         color: rgb(61, 2, 46);
         font-size: 20px;
         fonr-weight: bold;
         padding: 12px;
         border-radius: 10px;
         border: 2px solid #8a2be2
     }

     ul > li:nth-child(5) {
        background-color: rgb(248, 158, 242);
        color: black;
        border: 3px solid #411a2e;
     }

     ul > li:hover {
        background-color: rgb(118, 51, 91);
        color: rgb(242, 245, 246);
        cursor: pointer;
        transform: scale(1.05);
     }  

     button {
        color: rgb(37, 2, 46);
        border: none;
        border-radius: 20px;
        padding: 12px 24px;
        font-weight: bold;
     }

     button:hover {
        background-color: #e45fbe;
     }
    </style>

    <body>
        <h1> My Ice Cream Shop Menu </h1>
        <p> Welcome to Scoops of Delight!</p>
        <p class="shop-description">
            We serve colourful and delicious ice cream flavours filled with delight at every bite!
        </p>
        
        <div class="menu-box">
            <h2>Ice Cream Flavours</h2>

            <ul>
                <li>Chocolate</li>
                <li>Strawberry</li>
                <li>Vanilla</li>
                <li>Mango</li>
                <li>Kiwi-Special Flavour</li>
                <li>Cookies & Cream</li>
                <li>Lemon Sorbet</li>
                <li>Grape & Raspberry</li>
            </ul>
            <button>Order Now</button>
        </div>
    </body>
</html>
