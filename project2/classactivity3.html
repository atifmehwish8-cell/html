<!DOCTYPE html>
<html>

<head>
    <title> Tables,lists and links</title>
</head>

<body>
    <h2>Links</h2>
    <p><a href="https://www.google.com">Google</a></p>
    <h2>Lists</h2>
    <h3>Unordered List</h3>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <h3>Ordered List</h3>
    <ol>
        <li>First item </li>
        <li>Second item</li>
    </ol>
    <h2>Tables</h2>
    <table border="2">
        <tr>
            <th>Number</th>
            <th>Roll no.</th>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
        </tr>
        <tr>
            <td>5638</td>
            <td>5634</td>
        </tr>
    </table>
    <h2> Descriptions </h2>
    <dl>
        <dt>Global warming</dt>
        <dd>Global warming is the overall increase in temperature of the Earths atmosphere. </dd>
    </dl>
</body>

</html>
